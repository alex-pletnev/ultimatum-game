org.gradle.configuration-cache=true
org.gradle.caching=true
# T-046 / T-018 — JDK для этого проекта, чтобы не требовать JAVA_HOME в окружении.
# На macOS с brew: `brew install openjdk@21`. Путь ниже — стандартный для Apple Silicon.
org.gradle.java.home=/opt/homebrew/opt/openjdk@21/libexec/openjdk.jdk/Contents/Home
