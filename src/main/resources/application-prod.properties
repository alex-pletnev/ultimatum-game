# Prod profile: только INFO, JSON-логи (см. logback-spring.xml).
logging.level.edu.itmo.ultimatumgame=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
spring.jpa.show-sql=false

# T-090: dev-плагин spring-boot-docker-compose под prod-профилем не нужен.
# `developmentOnly`-scope в build.gradle.kts уже отсекает его из prod-jar, но
# защита в конфиге дублирует гарантию если jar собран без scope-разделения.
spring.docker.compose.enabled=false

# T-090: actuator в prod — только health и prometheus. `info` может утекать build-метаданные.
management.endpoints.web.exposure.include=health,prometheus
