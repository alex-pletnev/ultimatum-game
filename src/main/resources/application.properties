spring.application.name=ultimatum-game
server.servlet.context-path=/api/v1
management.endpoints.web.exposure.include=*
token.signing.key =${JWT_SIGNING_KEY}

#jpa
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#log
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.edu.itmo.ultimatum_game=DEBUG
logging.level.org.springframework.web.socket.messaging.StompSubProtocolHandler= TRACE
logging.level.org.springframework.messaging.simp.stomp= TRACE

#springwolf (async api)
springwolf.docket.base-package=edu.itmo.ultimatum_game
springwolf.docket.info.title=Ultimatum Game WS API
springwolf.docket.info.version=v1
springwolf.docket.info.description=STOMP over WebSocket API of Ultimatum Game. Generated from source annotations.
springwolf.docket.servers.stomp.protocol=stomp
springwolf.docket.servers.stomp.host=localhost:8080/api/v1/ws
