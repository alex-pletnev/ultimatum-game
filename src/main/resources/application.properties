spring.application.name=ultimatum-game
server.servlet.context-path=/api/v1
# actuator: только то, что нужно для health-checks и Prometheus scrape.
management.endpoints.web.exposure.include=health,info,prometheus
# По умолчанию — dev-профиль (plaintext-логи, DEBUG). В prod — SPRING_PROFILES_ACTIVE=prod.
spring.profiles.active=dev
token.signing.key =${JWT_SIGNING_KEY}

#jpa
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Уровни логирования вынесены в профильные application-{dev,prod}.properties.
# Формат (plaintext vs JSON) — в logback-spring.xml.
logging.level.root=INFO

#springwolf (async api)
springwolf.docket.base-package=edu.itmo.ultimatumgame
springwolf.docket.info.title=Ultimatum Game WS API
springwolf.docket.info.version=v1
springwolf.docket.info.description=STOMP over WebSocket API of Ultimatum Game. Generated from source annotations.
springwolf.docket.servers.stomp.protocol=stomp
springwolf.docket.servers.stomp.host=localhost:8080/api/v1/ws
