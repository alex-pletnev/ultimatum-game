spring.application.name=ultimatum-game
server.servlet.context-path=/api/v1
# T-090: PaaS-хостеры (Fly.io/Render/Railway/Koyeb) прокидывают порт через $PORT.
server.port=${PORT:8080}
# actuator: только то, что нужно для health-checks и Prometheus scrape.
management.endpoints.web.exposure.include=health,info,prometheus
# По умолчанию — dev-профиль (plaintext-логи, DEBUG). В prod — SPRING_PROFILES_ACTIVE=prod.
spring.profiles.active=dev
token.signing.key =${JWT_SIGNING_KEY}

# T-090: datasource externalized. Dev-defaults совпадают с compose.yaml (postgres/postgres/postgres).
# В prod задать DB_URL/DB_USER/DB_PASSWORD через хостера (Fly.io secrets, Render env, ...).
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# T-090: CORS/WS origin-список из env. Читается @Value'ами в SecurityConfiguration и WebSocketConfig.
# CSV, e.g. "https://<gh-user>.github.io,https://staging.example.com". Dev-default — localhost:[*].
app.cors.origins=${APP_CORS_ORIGINS:http://localhost:[*]}

#jpa (T-044): Flyway теперь владеет схемой. Hibernate только validate'ит соответствие entity ↔ таблицы.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway (T-044). baseline-on-migrate=true нужен, чтобы на уже существующей
# локальной БД (dev-контейнер, где схема была накатана через ddl-auto=update
# до T-044) Flyway пометил V1 как applied без реального запуска, а не падал
# с «Found non-empty schema without schema history table».
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration

# Уровни логирования вынесены в профильные application-{dev,prod}.properties.
# Формат (plaintext vs JSON) — в logback-spring.xml.
logging.level.root=INFO

#springwolf (async api)
springwolf.docket.base-package=edu.itmo.ultimatumgame
springwolf.docket.info.title=Ultimatum Game WS API
springwolf.docket.info.version=v1
springwolf.docket.info.description=STOMP over WebSocket API of Ultimatum Game. Generated from source annotations.
springwolf.docket.servers.stomp.protocol=stomp
springwolf.docket.servers.stomp.host=localhost:8080/api/v1/ws
